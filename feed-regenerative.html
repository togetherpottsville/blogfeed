<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Together Pottsville</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&family=Arimo:wght@400;700&display=swap" rel="stylesheet">
  <style>

    /* ---- Reset ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ---- Base ---- */
    body {
      font-family: 'Arimo', sans-serif;
      font-size: 1rem;
      color: #1c1c1c;
      background: #dbe8e9;
      padding: 0;
      margin: 0;
    }

    /* ---- Pagination ---- */
    #pagination {
      margin-bottom: 24px;
    }

    .page-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    /* ---- Filter chips ---- */
    .filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .chip {
      font-family: 'Arimo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid #116069;
      border-radius: 20px;
      background: transparent;
      color: #116069;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }

    .chip:hover,
    .chip.active {
      background: #116069;
      color: #ffffff;
    }

    .chip:disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    /* ---- List layout (all feed) ---- */
    .post-list {
      display: flex;
      flex-direction: column;
    }

    .post-list .post {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 18px 0;
      border-top: 1px solid #e0e0e0;
      text-decoration: none;
      color: inherit;
    }

    .post-list .post:last-child {
      border-bottom: 1px solid #e0e0e0;
    }

    .post-list .post-image,
    .post-list .post-image-placeholder {
      width: 160px;
      min-width: 160px;
      height: 106px;
      border-radius: 4px;
      display: block;
      object-fit: cover;
    }

    .post-list .post-image-placeholder {
      background: #e8f0f1;
    }

    /* ---- Grid layout (single category feeds) ---- */
    .post-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: stretch;
      justify-content: center;
    }

    .post-grid .post {
      flex: 0 1 calc(50% - 8px);
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
    }

    .post-grid .post-image,
    .post-grid .post-image-placeholder {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .post-grid .post-image-placeholder {
      background: #e8f0f1;
    }

    .post-grid .post-meta {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ---- Post meta (shared) ---- */
    .post-meta {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .post-date {
      font-family: 'Arimo', sans-serif;
      font-size: 1rem;
      color: #555555;
      margin-bottom: 6px;
    }

    .post-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: #1c1c1c;
      line-height: 1.25;
      padding: 6px 0;
      margin-bottom: 4px;
      display: block;
    }

    .post:hover .post-title {
      color: #116069;
    }

    .post-category {
      font-family: 'Arimo', sans-serif;
      font-size: 1rem;
      color: #555555;
      margin-bottom: 12px;
      flex: 1;
    }

    .post-read {
      font-family: 'Arimo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid #116069;
      border-radius: 20px;
      background: transparent;
      color: #116069;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-top: auto;
    }

    .post:hover .post-read {
      background: #116069;
      color: #ffffff;
    }

    /* ---- Mobile ---- */
    @media (max-width: 600px) {

      body {
        font-size: 1.2rem;
      }

      .chip {
        font-size: 1.2rem;
      }

      .post-list .post {
        flex-direction: column;
        gap: 10px;
      }

      .post-list .post-image,
      .post-list .post-image-placeholder {
        width: 100%;
        min-width: 100%;
        height: 200px;
      }

      .post-title {
        font-size: 1.7rem;
      }

      .post-date,
      .post-category,
      .post-read {
        font-size: 1.2rem;
      }

      .post-grid {
        justify-content: stretch;
      }

      .post-grid .post {
        flex: 0 1 100%;
      }
    }

  </style>
</head>
